<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة domin BOdaSF الشاملة</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-color: #38bdf8;
            --success-color: #4ade80;
            --error-color: #f87171;
            --text-color: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }
        h1 { text-align: center; color: var(--primary-color); font-size: 2.2rem; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 0.95rem; }
        .screen { display: none; }
        .screen.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 0.9rem; }
        input[type="email"], input[type="password"], input[type="text"], input[type="file"] {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        .input-group { display: flex; align-items: center; }
        .input-group input { flex: 1; border-radius: 0 12px 12px 0; }
        .suffix {
            background: #334155;
            padding: 14px;
            border-radius: 12px 0 0 12px;
            border: 1px solid #334155;
            border-right: none;
            direction: ltr;
            color: #94a3b8;
        }
        button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background: #0369a1; }
        .switch-text { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #94a3b8; }
        .switch-text a { color: var(--primary-color); text-decoration: none; font-weight: bold; cursor: pointer; }
        .status { margin-top: 15px; font-size: 0.95rem; text-align: center; font-weight: 500; min-height: 24px; white-space: pre-line; }
        .success { color: var(--success-color); }
        .error { color: var(--error-color); }
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.4); padding: 10px 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border-color); }
        .logout-btn { width: auto; margin: 0; padding: 6px 12px; background: #e11d48; font-size: 0.85rem; border-radius: 8px; }
        .logout-btn:hover { background: #be123c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>domin BOdaSF</h1>
        <div class="subtitle">النظام الموحد لإدارة الحسابات وحجز الاستضافات تلقائياً</div>

        <div id="loginScreen" class="screen active">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="loginEmail" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button onclick="login()">تسجيل الدخول</button>
            <div id="loginStatus" class="status"></div>
            <div class="switch-text">ليس لديك حساب؟ <a onclick="switchScreen('registerScreen')">إنشاء حساب جديد</a></div>
        </div>

        <div id="registerScreen" class="screen">
            <div class="form-group">
                <label>البريد الإلكتروني الجديد</label>
                <input type="email" id="regEmail" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور (6 أحرف أو أكثر)</label>
                <input type="password" id="regPassword" placeholder="••••••••">
            </div>
            <button onclick="register()">إنشاء الحساب وتفعيله</button>
            <div id="regStatus" class="status"></div>
            <div class="switch-text">لديك حساب بالفعل؟ <a onclick="switchScreen('loginScreen')">تسجيل الدخول</a></div>
        </div>

        <div id="dashboardScreen" class="screen">
            <div class="user-bar">
                <span id="welcomeText">أهلاً بك..</span>
                <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
            </div>

            <div class="form-group" style="background: rgba(15, 23, 42, 0.3); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color);">
                <label style="color: #fff; font-weight: bold; margin-bottom: 12px;">الخطوة 1: احجز الدومين الفرعي الخاص بك:</label>
                <div class="input-group">
                    <input type="text" id="subdomain" placeholder="مثال: my-portfolio" style="direction: ltr;">
                    <span class="suffix">.bodasf.com</span>
                </div>
                <button onclick="checkAndReserve()">التحقق من الإتاحة وحجز الخانة في Firebase</button>
                <div id="domainStatus" class="status"></div>
            </div>

            <div class="form-group" style="background: rgba(15, 23, 42, 0.3); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-top: 25px;">
                <label style="color: #fff; font-weight: bold; margin-bottom: 12px;">الخطوة 2: ارفع ملف السكربت لتفعيله على الإنترنت:</label>
                <input type="file" id="scriptFile">
                <button onclick="uploadToGitHub()" style="background: #10b981;">نشر السكربت وتفعيل الموقع تلقائياً</button>
                <div id="uploadStatus" class="status"></div>
            </div>
        </div>
    </div>

    <script>
        // تكوين الفايربيز المباشر والصحيح الخاص بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyDfL4KZ0wDUvJI9Go_luMfKFGpW-vj9c8c",
            authDomain: "domin-bodasf.firebaseapp.com",
            databaseURL: "https://domin-bodasf-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "domin-bodasf",
            storageBucket: "domin-bodasf.firebasestorage.app",
            messagingSenderId: "1061722048531",
            appId: "1:1061722048531:web:ffb75c998e238661c0d7e6",
            measurementId: "G-W60VXDTYXH"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let currentSubdomain = "";

        // مراقبة حالة جلسة المستخدم تلقائياً
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('welcomeText').innerText = `المستخدم: ${user.email}`;
                switchScreen('dashboardScreen');
            } else {
                switchScreen('loginScreen');
            }
        });

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            clearStatuses();
        }

        function clearStatuses() {
            document.querySelectorAll('.status').forEach(s => { s.innerText = ''; s.className = 'status'; });
        }

        // دالة إنشاء حساب جديد
        async function register() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const status = document.getElementById('regStatus');
            if(!email || !password) return alert('برجاء ملء جميع الحقول!');

            status.className = "status"; status.innerText = "جاري إنشاء الحساب...";
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                status.className = "status success"; status.innerText = "تم إنشاء الحساب بنجاح ودخولك للوحة!";
            } catch (err) {
                status.className = "status error"; status.innerText = "فشل التسجيل: " + err.message;
            }
        }

        // دالة تسجيل الدخول
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const status = document.getElementById('loginStatus');
            if(!email || !password) return alert('برجاء إدخال البريد والباسورد!');

            status.className = "status"; status.innerText = "جاري التحقق...";
            try {
                await auth.signInWithEmailAndPassword(email, password);
                status.className = "status success"; status.innerText = "تم تسجيل الدخول بنجاح!";
            } catch (err) {
                status.className = "status error"; status.innerText = "خطأ: " + err.message;
            }
        }

        // تسجيل الخروج
        function logout() { auth.signOut(); currentSubdomain = ""; }

        // الخطوة الأولى: فحص وحجز الدومين عبر السيرفر الخلفي
        async function checkAndReserve() {
            const sub = document.getElementById('subdomain').value.trim().toLowerCase();
            const statusDiv = document.getElementById('domainStatus');
            if(!sub) return alert('اكتب اسم الدومين المطلوب أولاً!');

            statusDiv.className = "status"; statusDiv.innerText = "جاري التحقق من التوافر وحجز الخانة...";

            try {
                const token = await auth.currentUser.getIdToken();
                const res = await fetch('/api/reserve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ subdomain: sub })
                });
                const data = await res.json();

                if(data.success) {
                    currentSubdomain = sub;
                    statusDiv.className = "status success"; statusDiv.innerText = data.message;
                } else {
                    statusDiv.className = "status error"; statusDiv.innerText = data.message;
                }
            } catch (e) {
                statusDiv.className = "status error"; statusDiv.innerText = "حدث خطأ بالاتصال بالسيرفر.";
            }
        }

        // الخطوة الثانية: تحويل الملف ورفعه ومزامنته مع GitHub
        async function uploadToGitHub() {
            const fileInput = document.getElementById('scriptFile');
            const uploadStatus = document.getElementById('uploadStatus');
            
            if(!currentSubdomain) return alert('يجب إتمام الخطوة 1 وحجز الدومين بنجاح أولاً!');
            if(fileInput.files.length === 0) return alert('الرجاء اختيار ملف السكربت المراد نشره!');

            uploadStatus.className = "status"; uploadStatus.innerText = "جاري بناء المستودع ورفع الملفات لـ GitHub وتحديث الداتا...";

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                const content = e.target.result;
                try {
                    const token = await auth.currentUser.getIdToken();
                    const res = await fetch('/api/deploy', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            subdomain: currentSubdomain,
                            fileName: file.name,
                            fileContent: btoa(unescape(encodeURIComponent(content)))
                        })
                    });
                    const data = await res.json();

                    if(data.success) {
                        uploadStatus.className = "status success";
                        uploadStatus.innerText = data.message + "\nرابط المستودع: " + data.url;
                    } else {
                        uploadStatus.className = "status error"; uploadStatus.innerText = "فشل النشر: " + data.error;
                    }
                } catch(err) {
                    uploadStatus.className = "status error"; uploadStatus.innerText = "خطأ أثناء محاولة الرفع.";
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
