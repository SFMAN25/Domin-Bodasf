<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>domin BODAsF - نظام إدارة الاستضافات</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h1 { color: #58a6ff; margin-bottom: 5px; }
        p.subtitle { color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        .user-badge { background: #21262d; padding: 8px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; color: #c9d1d9; }
        .section { border: 1px solid #21262d; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: right; }
        .section h3 { margin-top: 0; color: #f0f6fc; font-size: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #8b949e; }
        .input-group { display: flex; align-items: center; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 2px 10px; }
        .input-group span { color: #8b949e; font-size: 14px; }
        input[type="text"], input[type="file"] { width: 100%; background: transparent; border: none; color: #ffffff; padding: 10px; outline: none; font-size: 14px; }
        button { width: 100%; background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #2ea44f; }
        button.blue-btn { background: #1f6feb; }
        button.blue-btn:hover { background: #388bfd; }
        .status-msg { font-size: 13px; margin-top: 8px; display: none; font-weight: bold; text-align: center; }
        .error { color: #f85149; }
        .success { color: #56d364; }
    </style>
</head>
<body>

<div class="container">
    <h1>domin BODAsF</h1>
    <p class="subtitle">النظام الموحد لإدارة الحسابات وحجز الاستضافات تلقائياً</p>

    <div class="user-badge">
        المستخدم: <span id="user-email">01285577074ay@gmail.com</span>
    </div>

    <div class="section">
        <h3>الخطوة 1: احجز الدومين الفرعي الخاص بك:</h3>
        <label>ادخل الاسم بدون مسافات (مثال: af-tech-math)</label>
        <div class="input-group">
            <input type="text" id="domain-name" placeholder="my-portfolio">
            <span>.bodasf.com</span>
        </div>
        <button class="blue-btn" id="btn-reserve" onclick="reserveDomain()">التحقق من الإتاحة وحجز الخطة في Firebase</button>
        <div id="reserve-status" class="status-msg"></div>
    </div>

    <div class="section">
        <h3>الخطوة 2: ارفع ملف السكريبت لتفعيله على الإنترنت:</h3>
        <input type="file" id="script-file" accept=".html">
        <button id="btn-deploy" onclick="deployScript()">نشر السكريبت وتفعيل الموقع تلقائياً</button>
        <div id="deploy-status" class="status-msg"></div>
    </div>
</div>

<script>
    // 🚨⚠️ خطوة حاسمة: امسح الرابط اللى تحت ده وحط مكانه رابط السيرفر اللي موقع Render ادهولك بالظبط!
    const BACKEND_URL = "https://boda-backend.onrender.com"; 

    let isDomainReserved = false;
    const userEmail = document.getElementById('user-email').innerText;

    // دالة فحص وحجز الدومين الفرعي
    async function reserveDomain() {
        const domainInput = document.getElementById('domain-name').value.trim();
        const statusDiv = document.getElementById('reserve-status');
        
        statusDiv.style.display = "none";

        if (!domainInput) {
            statusDiv.className = "status-msg error";
            statusDiv.innerText = "يرجى كتابة اسم الدومين أولاً!";
            statusDiv.style.display = "block";
            return;
        }

        if (domainInput.includes(" ")) {
            statusDiv.className = "status-msg error";
            statusDiv.innerText = "خطأ: لا يمكن لاسم الدومين أن يحتوي على مسافات.";
            statusDiv.style.display = "block";
            return;
        }

        statusDiv.className = "status-msg";
        statusDiv.innerText = "جاري الاتصال بالخادم السري وفحص الإتاحة...";
        statusDiv.style.display = "block";

        try {
            const response = await fetch(`${BACKEND_URL}/api/reserve-domain`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain: domainInput, userEmail: userEmail })
            });

            const data = await response.json();

            if (data.success) {
                statusDiv.className = "status-msg success";
                statusDiv.innerText = data.message;
                isDomainReserved = true;
            } else {
                statusDiv.className = "status-msg error";
                statusDiv.innerText = data.error;
                isDomainReserved = false;
            }
        } catch (error) {
            statusDiv.className = "status-msg error";
            statusDiv.innerText = "حدث خطأ بالاتصال بالسيرفر. تأكد من اكتمال رفع سيرفر Render وتفعيل الرابط.";
            isDomainReserved = false;
        }
    }

    // دالة قراءة الملف ورفعه ونشره
    async function deployScript() {
        const domainInput = document.getElementById('domain-name').value.trim();
        const fileInput = document.getElementById('script-file');
        const statusDiv = document.getElementById('deploy-status');

        statusDiv.style.display = "none";

        if (!isDomainReserved) {
            alert("يجب إتمام الخطوة 1 وحجز الدومين أولاً بنجاح!");
            return;
        }

        if (fileInput.files.length === 0) {
            statusDiv.className = "status-msg error";
            statusDiv.innerText = "يرجى اختيار ملف السكريبت أولاً!";
            statusDiv.style.display = "block";
            return;
        }

        statusDiv.className = "status-msg";
        statusDiv.innerText = "جاري معالجة السكريبت وفتح مستودع تلقائي وتفعيل الـ GitHub Pages...";
        statusDiv.style.display = "block";

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = async function(e) {
            const fileContent = e.target.result;

            try {
                const response = await fetch(`${BACKEND_URL}/api/deploy-script`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        domain: domainInput,
                        fileContent: fileContent,
                        userEmail: userEmail
                    })
                });

                const data = await response.json();

                if (data.success) {
                    statusDiv.className = "status-msg success";
                    statusDiv.innerHTML = `${data.message} <br> <a href="${data.url}" target="_blank" style="color:#58a6ff; font-weight:bold; text-decoration:underline;">اضغط هنا لزيارة موقعك الجديد أونلاين 🚀</a>`;
                } else {
                    statusDiv.className = "status-msg error";
                    statusDiv.innerText = data.error;
                }
            } catch (error) {
                statusDiv.className = "status-msg error";
                statusDiv.innerText = "فشل الاتصال بالخادم أثناء عملية رفع ونشر السكريبت.";
            }
        };

        reader.readAsText(file);
    }
</script>
</body>
</html>
